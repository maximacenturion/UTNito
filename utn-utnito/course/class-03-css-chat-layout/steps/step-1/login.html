<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UTNito | Login</title>
    <link rel="stylesheet" href="./tokens.css" />
    <link rel="stylesheet" href="./login.css" />
  </head>
  <body>
    <main class="login-page">
      <section class="login-card">
        <header class="brand-block">
          <img src="./assets/utnito-logo.svg" alt="UTNito logo" class="brand-logo" />
          <h1>Welcome to UTNito</h1>
          <p class="subtitle">Sign in to continue.</p>
        </header>

        <form class="login-form" action="./chat.html" method="get">
          <label for="username">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            placeholder="e.g. carlos.gardel"
            required
            minlength="3"
            maxlength="20"
            pattern="[A-Za-z0-9._-]+"
          />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="carlos@utn.edu.ar" required />

          <label for="age">Age</label>
          <input id="age" name="age" type="number" min="16" max="120" required />

          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Enter your password"
            required
            minlength="6"
            maxlength="20"
          />

          <button type="submit">Login (Button)</button>
          <button type="button" class="secondary-btn">Composer action demo</button>
        </form>

        <p class="login-help-link"><a href="./chat.html">Enter chat with link</a></p>

        <footer class="login-footer">
          <p class="program-name">UTN Programación III</p>
          <p>Academic prototype for educational use.</p>
        </footer>
      </section>
    </main>
  </body>
</html>
