<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UTNito | Chat</title>
    <link rel="stylesheet" href="./tokens.css" />
    <link rel="stylesheet" href="./chat.css" />
  </head>
  <body>
    <div class="chat-layout">
      <aside class="sidebar">
        <button class="new-chat-btn">+ New chat</button>
        <p class="section-title">Your chats</p>
        <ul class="chat-list">
          <li class="chat-item active">Final project planning</li>
          <li class="chat-item">REST endpoint questions</li>
        </ul>
      </aside>

      <main class="chat-main">
        <header class="chat-header">
          <h1>UTNito</h1>
          <p>Feel free to talk to UTNito about anything.</p>
        </header>

        <section class="messages">
          <article class="message assistant"><p>Hi! I am UTNito.</p></article>
          <article class="message user"><p>Can you explain today's class?</p></article>
        </section>

        <footer class="composer-wrap">
          <form class="composer" action="#" method="post">
            <textarea id="composer-input" rows="1" placeholder="Message UTNito..."></textarea>
            <button type="submit">Send</button>
          </form>
        </footer>
      </main>
    </div>
  </body>
</html>
